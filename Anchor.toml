[toolchain]
anchor_version = "0.30.1"
solana_version = "2.1.0"

[features]
resolution = true
skip-lint = false

[programs.devnet]
proofball = "7JNc8D9Pt87apERHFsXoTnibWEvxF9n5wCJJinJopaPv"

[registry]
url = "https://api.apr.dev"

[provider]
cluster = "Devnet"
wallet = "~/.config/solana/id.json"

[scripts]
test = "yarn run ts-mocha -p ./tsconfig.json -t 1000000 tests/**/*.ts"

[test]
startup_wait = 10000
shutdown_wait = 2000
upgradeable = false
