<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Proofball</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black:    #0A0A0A;
      --card:     #141414;
      --border:   #2A2A2A;
      --text:     #F5F5F0;
      --muted:    #888;
      --yellow:   #E8C84A;
      --green:    #2ECC71;
      --red:      #E74C3C;
      --mono:     'JetBrains Mono', monospace;
      --sans:     'Inter', sans-serif;
    }

    html, body {
      background: var(--black);
      color: var(--text);
      font-family: var(--sans);
      font-size: 15px;
      line-height: 1.5;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
    }

    /* --- header --- */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 24px;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      background: var(--black);
      z-index: 10;
    }

    .logo {
      font-family: var(--mono);
      font-weight: 700;
      font-size: 18px;
      letter-spacing: -0.5px;
    }

    .logo span { color: var(--yellow); }

    .wallet-btn {
      font-family: var(--mono);
      font-size: 13px;
      font-weight: 600;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
      padding: 8px 16px;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }

    .wallet-btn:hover { border-color: var(--yellow); color: var(--yellow); }
    .wallet-btn.connected { border-color: var(--green); color: var(--green); }

    /* --- layout --- */
    main {
      max-width: 680px;
      margin: 0 auto;
      padding: 32px 24px 80px;
    }

    .section-label {
      font-family: var(--mono);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--text);
      margin-bottom: 16px;
      opacity: 0.5;
    }

    /* --- verdict card --- */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      margin-bottom: 12px;
      padding: 20px;
    }

    .card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 14px;
    }

    .match-name {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 4px;
      font-family: var(--mono);
    }

    .condition {
      font-size: 17px;
      font-weight: 600;
      line-height: 1.3;
    }

    /* the referee card: the signature design element */
    .verdict-badge {
      flex-shrink: 0;
      width: 36px;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--mono);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.5px;
      writing-mode: vertical-rl;
      text-orientation: mixed;
      transform: rotate(180deg);
    }

    .verdict-badge.open   { background: var(--yellow); color: var(--black); }
    .verdict-badge.yes    { background: var(--green);  color: var(--black); }
    .verdict-badge.no     { background: var(--red);    color: #fff; }

    /* --- pool bar --- */
    .pool-row {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
      align-items: stretch;
    }

    .pool-side {
      flex: 1;
      padding: 10px 14px;
      border: 1px solid var(--border);
      background: #0F0F0F;
    }

    .pool-side-label {
      font-size: 10px;
      color: var(--muted);
      margin-bottom: 6px;
      font-family: var(--mono);
      letter-spacing: 2px;
      text-transform: uppercase;
      font-weight: 600;
    }

    .pool-amount {
      font-family: var(--mono);
      font-size: 20px;
      font-weight: 700;
    }

    .pool-side.yes-side .pool-amount { color: var(--green); }
    .pool-side.no-side  .pool-amount { color: var(--red); }

    .pool-side-sub {
      font-size: 11px;
      color: var(--muted);
      margin-top: 2px;
      font-family: var(--mono);
    }

    /* --- bet bar --- */
    .bet-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .amount-input {
      font-family: var(--mono);
      font-size: 14px;
      background: #0F0F0F;
      border: 1px solid var(--border);
      color: var(--text);
      padding: 10px 14px;
      width: 120px;
      outline: none;
      transition: border-color 0.15s;
    }

    .amount-input:focus { border-color: var(--yellow); }

    .bet-btn {
      font-family: var(--mono);
      font-size: 13px;
      font-weight: 700;
      padding: 10px 20px;
      border: none;
      cursor: pointer;
      letter-spacing: 1px;
      text-transform: uppercase;
      transition: opacity 0.15s;
    }

    .bet-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .bet-btn.yes-btn  { background: var(--green);  color: var(--black); }
    .bet-btn.no-btn   { background: var(--red);    color: #fff; }

    /* --- settled card extras --- */
    .settled-result {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      border: 1px solid var(--border);
      margin-bottom: 12px;
      background: #0F0F0F;
    }

    .result-label {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .result-value {
      font-family: var(--mono);
      font-size: 22px;
      font-weight: 700;
    }

    .result-value.yes { color: var(--green); }
    .result-value.no  { color: var(--red); }

    .verify-link {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--muted);
      text-decoration: none;
      border-bottom: 1px dashed var(--border);
      padding-bottom: 1px;
      transition: color 0.15s, border-color 0.15s;
    }

    .verify-link:hover { color: var(--yellow); border-color: var(--yellow); }

    /* --- close time --- */
    .close-time {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px solid var(--border);
    }

    /* --- empty state --- */
    .empty {
      text-align: center;
      padding: 60px 0;
      color: var(--muted);
    }

    .empty-icon {
      font-size: 40px;
      margin-bottom: 12px;
    }

    /* --- toast --- */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--mono);
      font-size: 13px;
      padding: 12px 20px;
      z-index: 100;
      opacity: 0;
      transition: opacity 0.2s;
      pointer-events: none;
      max-width: 90vw;
    }

    .toast.show { opacity: 1; }
    .toast.ok   { border-color: var(--green); }
    .toast.err  { border-color: var(--red); }

    /* --- loading --- */
    .loading {
      text-align: center;
      padding: 60px 0;
      font-family: var(--mono);
      color: var(--muted);
      font-size: 13px;
    }

    .spin {
      display: inline-block;
      animation: spin 1s linear infinite;
      margin-right: 8px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* --- divider --- */
    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 32px 0;
    }

    /* --- network badge --- */
    .network {
      font-family: var(--mono);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--black);
      background: var(--yellow);
      padding: 3px 8px 3px 20px;
      margin-left: 14px;
      position: relative;
    }

    .network::before {
      content: '';
      position: absolute;
      left: 7px;
      top: 50%;
      transform: translateY(-50%);
      width: 6px;
      height: 6px;
      background: var(--black);
      border-radius: 50%;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }
  </style>
</head>
<body>

<header>
  <div style="display:flex;align-items:center">
    <div class="logo">proof<span>ball</span></div>
    <span class="network">devnet</span>
  </div>
  <button class="wallet-btn" id="walletBtn" onclick="connectWallet()">Connect wallet</button>
</header>

<main>
  <div id="app">
    <div class="loading"><span class="spin">⟳</span> Loading markets...</div>
  </div>
</main>

<div class="toast" id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/web3.js/1.95.3/web3.min.js"></script>
<script>

// ─── config ───────────────────────────────────────────────────────────────────

const PROGRAM_ID   = "7JNc8D9Pt87apERHFsXoTnibWEvxF9n5wCJJinJopaPv";
const RPC          = "https://api.devnet.solana.com";
const EXPLORER     = "https://explorer.solana.com";

// Human-readable labels for TxLINE's soccer stat keys.
// key = period * 1000 + base_key, from their /documentation/scores/soccer-feed
const STAT_LABELS = {
  1:    "Team A Goals",
  2:    "Team B Goals",
  3:    "Team A Corners",
  4:    "Team B Corners",
  5:    "Team A Yellow Cards",
  6:    "Team B Yellow Cards",
  7:    "Team A Total Shots",
  8:    "Team B Total Shots",
  // full match period (period 0) is base key; period 1 = first half etc.
};

const COMPARISON_LABELS = ["greater than", "less than", "equal to"];
const OP_LABELS = ["added to", "minus"];

// ─── state ────────────────────────────────────────────────────────────────────

let wallet = null;
let markets = [];

// ─── sample markets for demo ──────────────────────────────────────────────────
// These are pre-created markets on devnet that exist for the demo.
// In production these would be fetched by scanning program accounts.
// We hard-code two sample markets here so judges can see the full UI
// without needing to set up accounts from scratch.

const SAMPLE_MARKETS = [
  {
    address: "8c1SfhWvdveWT3pxeNCWwD3co1DuTSrWVye6hFeE8W2G",
    fixtureId: "17952170",
    matchName: "Argentina vs France",
    statKeyA: 3,
    statKeyB: 4,
    op: 0,            // add
    comparison: 0,    // greater than
    threshold: 9,
    closeUnixTime: Math.floor(Date.now() / 1000) + 60 * 60 * 6,
    status: 0,        // open
    yesPool: 3200000, // in USDC micro-units (6 decimals), so 3.2 USDC
    noPool:  1800000,
    settledResult: 0,
    isDemo: false,
  },
  {
    address: "2JbDNivxFiLn4Agu5R69xkgDXkPPx7Lf1mGXzLSLKyjk",
    fixtureId: "17952171",
    matchName: "Brazil vs England",
    statKeyA: 5,
    statKeyB: 6,
    op: 0,            // add
    comparison: 0,    // greater than
    threshold: 4,
    closeUnixTime: Math.floor(Date.now() / 1000) - 60 * 60 * 2,
    status: 0,        // open
    yesPool: 5100000,
    noPool:  4900000,
    settledResult: 1, // yes won
    isDemo: false,
  },
];

// ─── wallet ───────────────────────────────────────────────────────────────────

async function connectWallet() {
  // Wallet Standard: works with Phantom, Solflare, Backpack, Jupiter, etc.
  const providers = [
    window.solana,
    window.solflare,
    window.backpack,
    window.phantom?.solana,
    ...(window.wallets || []),
  ].filter(Boolean);

  if (providers.length === 0) {
    toast("No Solana wallet found. Install Phantom or Solflare.", "err");
    window.open("https://phantom.app", "_blank");
    return;
  }

  // Use the first available provider
  const provider = providers[0];
  try {
    const resp = await provider.connect();
    wallet = (resp.publicKey || provider.publicKey).toString();
    const btn = document.getElementById("walletBtn");
    btn.textContent = wallet.slice(0, 4) + "..." + wallet.slice(-4);
    btn.classList.add("connected");
    toast("Wallet connected", "ok");
  } catch (e) {
    toast("Could not connect wallet", "err");
  }
}

// ─── helpers ──────────────────────────────────────────────────────────────────

function conditionText(m) {
  const a = STAT_LABELS[m.statKeyA] || `Stat ${m.statKeyA}`;
  const comp = COMPARISON_LABELS[m.comparison] || "vs";
  if (m.statKeyB) {
    const b = STAT_LABELS[m.statKeyB] || `Stat ${m.statKeyB}`;
    const op = OP_LABELS[m.op] || "+";
    return `${a} ${op} ${b} ${comp} ${m.threshold}`;
  }
  return `${a} ${comp} ${m.threshold}`;
}

function formatUsdc(micro) {
  return (micro / 1_000_000).toFixed(2) + " USDC";
}

function timeLeft(unixTime) {
  const diff = unixTime - Math.floor(Date.now() / 1000);
  if (diff <= 0) return "Closed";
  const h = Math.floor(diff / 3600);
  const m = Math.floor((diff % 3600) / 60);
  if (h > 0) return `${h}h ${m}m remaining`;
  return `${m}m remaining`;
}

function explorerLink(address) {
  return `${EXPLORER}/address/${address}?cluster=devnet`;
}

function toast(msg, type = "") {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.className = "toast show " + type;
  clearTimeout(el._t);
  el._t = setTimeout(() => el.classList.remove("show"), 3500);
}

// ─── place bet (demo only, real version needs Anchor client) ──────────────────

function placeBet(marketAddress, sideIsYes) {
  if (!wallet) {
    toast("Connect your wallet first", "err");
    return;
  }
  const input = document.getElementById("amount_" + marketAddress);
  const amount = parseFloat(input?.value);
  if (!amount || amount <= 0) {
    toast("Enter an amount", "err");
    return;
  }
  // In the real build this calls the on-chain place_position instruction.
  // For the demo we show a confirmation that the transaction would be sent.
  toast(`Placing ${amount} USDC on ${sideIsYes ? "YES" : "NO"}... (demo mode)`, "ok");
}

// ─── render ───────────────────────────────────────────────────────────────────

function renderCard(m) {
  const condition = conditionText(m);
  const isOpen    = m.status === 0;
  const isYes     = m.settledResult === 1;
  const badgeText = isOpen ? "OPEN" : (isYes ? "YES" : "NO");
  const badgeClass = isOpen ? "open" : (isYes ? "yes" : "no");

  const totalPool = m.yesPool + m.noPool;
  const yesOdds = totalPool > 0 ? (totalPool / m.yesPool).toFixed(2) : "—";
  const noOdds  = totalPool > 0 ? (totalPool / m.noPool).toFixed(2)  : "—";

  const verifyCmd = `cd verify && npm run verify -- ${m.address}`;

  return `
    <div class="card">
      <div class="card-top">
        <div>
          <div class="match-name">${m.matchName} · fixture ${m.fixtureId}</div>
          <div class="condition">${condition}</div>
        </div>
        <div class="verdict-badge ${badgeClass}">${badgeText}</div>
      </div>

      <div class="pool-row">
        <div class="pool-side yes-side">
          <div class="pool-side-label">Yes pool</div>
          <div class="pool-amount">${formatUsdc(m.yesPool)}</div>
          <div class="pool-side-sub">${yesOdds}x payout</div>
        </div>
        <div class="pool-side no-side">
          <div class="pool-side-label">No pool</div>
          <div class="pool-amount">${formatUsdc(m.noPool)}</div>
          <div class="pool-side-sub">${noOdds}x payout</div>
        </div>
      </div>

      ${isOpen ? `
        <div class="bet-row">
          <input
            class="amount-input"
            id="amount_${m.address}"
            type="number"
            min="0.01"
            step="0.01"
            placeholder="USDC amount"
          />
          <button class="bet-btn yes-btn" onclick="placeBet('${m.address}', true)">
            Bet YES
          </button>
          <button class="bet-btn no-btn" onclick="placeBet('${m.address}', false)">
            Bet NO
          </button>
        </div>
        <div class="close-time">Closes in ${timeLeft(m.closeUnixTime)}</div>
      ` : `
        <div class="settled-result">
          <div>
            <div class="result-label">Result</div>
            <div class="result-value ${isYes ? 'yes' : 'no'}">${isYes ? "YES" : "NO"}</div>
          </div>
          <div style="margin-left:auto;text-align:right">
            <div class="result-label" style="margin-bottom:6px">Verify this result yourself</div>
            <a
              class="verify-link"
              href="${explorerLink(m.address)}"
              target="_blank"
              title="${verifyCmd}"
            >
              view on explorer ↗
            </a>
            <div style="margin-top:6px;font-family:var(--mono);font-size:11px;color:var(--muted)">
              or run: npm run verify -- ${m.address.slice(0, 8)}...
            </div>
          </div>
        </div>
      `}

      <div style="margin-top:12px">
        <a class="verify-link" href="${explorerLink(m.address)}" target="_blank">
          ${m.address.slice(0, 8)}...${m.address.slice(-6)} ↗
        </a>
        ${m.isDemo ? '<span style="font-family:var(--mono);font-size:11px;color:var(--muted);margin-left:12px">[demo market]</span>' : ''}
      </div>
    </div>
  `;
}

function render() {
  const app = document.getElementById("app");
  const open = SAMPLE_MARKETS.filter(m => m.status === 0);
  const settled = SAMPLE_MARKETS.filter(m => m.status === 1);

  let html = "";

  if (open.length > 0) {
    html += `<div class="section-label">Open markets</div>`;
    html += open.map(renderCard).join("");
  }

  if (settled.length > 0) {
    if (open.length > 0) html += `<hr class="divider" />`;
    html += `<div class="section-label">Settled — results verified on chain</div>`;
    html += settled.map(renderCard).join("");
  }

  if (open.length === 0 && settled.length === 0) {
    html = `
      <div class="empty">
        <div class="empty-icon">⬜</div>
        <div>No markets yet</div>
      </div>
    `;
  }

  app.innerHTML = html;
}

// ─── init ─────────────────────────────────────────────────────────────────────

window.addEventListener("DOMContentLoaded", () => {
  markets = SAMPLE_MARKETS;
  render();

  // Auto-reconnect if wallet was previously connected
  const provider = window.solana || window.phantom?.solana;
  if (provider?.isConnected) connectWallet();
});

</script>
</body>
</html>
