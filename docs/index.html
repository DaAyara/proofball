<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Proofball</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black:    #0A0A0A;
      --card:     #141414;
      --border:   #2A2A2A;
      --text:     #F5F5F0;
      --muted:    #888;
      --yellow:   #E8C84A;
      --green:    #2ECC71;
      --red:      #E74C3C;
      --mono:     'JetBrains Mono', monospace;
      --sans:     'Inter', sans-serif;
    }

    html, body {
      background: var(--black);
      color: var(--text);
      font-family: var(--sans);
      font-size: 15px;
      line-height: 1.5;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
    }

    /* --- header --- */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 24px;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      background: var(--black);
      z-index: 10;
    }

    .logo {
      font-family: var(--mono);
      font-weight: 700;
      font-size: 18px;
      letter-spacing: -0.5px;
    }

    .logo span { color: var(--yellow); }

    .wallet-btn {
      font-family: var(--mono);
      font-size: 13px;
      font-weight: 600;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
      padding: 8px 16px;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }

    .wallet-btn:hover { border-color: var(--yellow); color: var(--yellow); }
    .wallet-btn.connected { border-color: var(--green); color: var(--green); }

    /* --- layout --- */
    main {
      max-width: 680px;
      margin: 0 auto;
      padding: 32px 24px 80px;
    }

    .section-label {
      font-family: var(--mono);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--text);
      margin-bottom: 16px;
      opacity: 0.5;
    }

    /* --- verdict card --- */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      margin-bottom: 12px;
      padding: 20px;
    }

    .card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 14px;
    }

    .match-name {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 4px;
      font-family: var(--mono);
    }

    .condition {
      font-size: 17px;
      font-weight: 600;
      line-height: 1.3;
    }

    /* the referee card: the signature design element */
    .verdict-badge {
      flex-shrink: 0;
      width: 36px;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--mono);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.5px;
      writing-mode: vertical-rl;
      text-orientation: mixed;
      transform: rotate(180deg);
    }

    .verdict-badge.open   { background: var(--yellow); color: var(--black); }
    .verdict-badge.yes    { background: var(--green);  color: var(--black); }
    .verdict-badge.no     { background: var(--red);    color: #fff; }

    /* --- pool bar --- */
    .pool-row {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
      align-items: stretch;
    }

    .pool-side {
      flex: 1;
      padding: 10px 14px;
      border: 1px solid var(--border);
      background: #0F0F0F;
    }

    .pool-side-label {
      font-size: 10px;
      color: var(--muted);
      margin-bottom: 6px;
      font-family: var(--mono);
      letter-spacing: 2px;
      text-transform: uppercase;
      font-weight: 600;
    }

    .pool-amount {
      font-family: var(--mono);
      font-size: 20px;
      font-weight: 700;
    }

    .pool-side.yes-side .pool-amount { color: var(--green); }
    .pool-side.no-side  .pool-amount { color: var(--red); }

    .pool-side-sub {
      font-size: 11px;
      color: var(--muted);
      margin-top: 2px;
      font-family: var(--mono);
    }

    /* --- bet bar --- */
    .bet-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .amount-input {
      font-family: var(--mono);
      font-size: 14px;
      background: #0F0F0F;
      border: 1px solid var(--border);
      color: var(--text);
      padding: 10px 14px;
      width: 120px;
      outline: none;
      transition: border-color 0.15s;
    }

    .amount-input:focus { border-color: var(--yellow); }

    .bet-btn {
      font-family: var(--mono);
      font-size: 13px;
      font-weight: 700;
      padding: 10px 20px;
      border: none;
      cursor: pointer;
      letter-spacing: 1px;
      text-transform: uppercase;
      transition: opacity 0.15s;
    }

    .bet-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .bet-btn.yes-btn  { background: var(--green);  color: var(--black); }
    .bet-btn.no-btn   { background: var(--red);    color: #fff; }

    /* --- settled card extras --- */
    .settled-result {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      border: 1px solid var(--border);
      margin-bottom: 12px;
      background: #0F0F0F;
    }

    .result-label {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .result-value {
      font-family: var(--mono);
      font-size: 22px;
      font-weight: 700;
    }

    .result-value.yes { color: var(--green); }
    .result-value.no  { color: var(--red); }

    .verify-link {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--muted);
      text-decoration: none;
      border-bottom: 1px dashed var(--border);
      padding-bottom: 1px;
      transition: color 0.15s, border-color 0.15s;
    }

    .verify-link:hover { color: var(--yellow); border-color: var(--yellow); }

    /* --- close time --- */
    .close-time {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px solid var(--border);
    }

    /* --- empty state --- */
    .empty {
      text-align: center;
      padding: 60px 0;
      color: var(--muted);
    }

    .empty-icon {
      font-size: 40px;
      margin-bottom: 12px;
    }

    /* --- toast --- */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--mono);
      font-size: 13px;
      padding: 12px 20px;
      z-index: 100;
      opacity: 0;
      transition: opacity 0.2s;
      pointer-events: none;
      max-width: 90vw;
    }

    .toast.show { opacity: 1; }
    .toast.ok   { border-color: var(--green); }
    .toast.err  { border-color: var(--red); }

    /* --- loading --- */
    .loading {
      text-align: center;
      padding: 60px 0;
      font-family: var(--mono);
      color: var(--muted);
      font-size: 13px;
    }

    .spin {
      display: inline-block;
      animation: spin 1s linear infinite;
      margin-right: 8px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* --- divider --- */
    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 32px 0;
    }

    /* --- network badge --- */
    .network {
      font-family: var(--mono);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--black);
      background: var(--yellow);
      padding: 3px 8px 3px 20px;
      margin-left: 14px;
      position: relative;
    }

    .network::before {
      content: '';
      position: absolute;
      left: 7px;
      top: 50%;
      transform: translateY(-50%);
      width: 6px;
      height: 6px;
      background: var(--black);
      border-radius: 50%;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }
  </style>
</head>
<body>

<header>
  <div style="display:flex;align-items:center">
    <div class="logo">proof<span>ball</span></div>
    <span class="network">devnet</span>
  </div>
  <button class="wallet-btn" id="walletBtn" onclick="connectWallet()">Connect wallet</button>
</header>

<main>
  <div id="app">
    <div class="loading"><span class="spin">⟳</span> Loading markets...</div>
  </div>
</main>

<div class="toast" id="toast"></div>

<script src="https://unpkg.com/@solana/web3.js@1.95.3/lib/index.iife.min.js"></script>
<script src="https://bundle.run/buffer@6.0.3"></script>
<script>const Buffer = buffer.Buffer;</script>
<script>

// ─── config ───────────────────────────────────────────────────────────────────

const PROGRAM_ID   = "7JNc8D9Pt87apERHFsXoTnibWEvxF9n5wCJJinJopaPv";
const RPC          = "https://api.devnet.solana.com";
const EXPLORER     = "https://explorer.solana.com";
const MINT = "9hnoacXHcJCsVErVJ4eHwcsHAeGkwZyjjBp8jvqbXu88";
const TOKEN_PROGRAM = "TokenkegQfeZyiNwAJbNbGKPFXCWuBvf9Ss623VQ5DA";
const ASSOCIATED_TOKEN_PROGRAM = "ATokenGPvbdGVxr1b2hvZbsiqW5xWH25efTNsLJe1bN8";

// Human-readable labels for TxLINE's soccer stat keys.
// key = period * 1000 + base_key, from their /documentation/scores/soccer-feed
const STAT_LABELS = {
  1:    "Team A Goals",
  2:    "Team B Goals",
  3:    "Team A Corners",
  4:    "Team B Corners",
  5:    "Team A Yellow Cards",
  6:    "Team B Yellow Cards",
  7:    "Team A Total Shots",
  8:    "Team B Total Shots",
  // full match period (period 0) is base key; period 1 = first half etc.
};

const COMPARISON_LABELS = ["greater than", "less than", "equal to"];
const OP_LABELS = ["added to", "minus"];

// ─── state ────────────────────────────────────────────────────────────────────

let wallet = null;
let markets = [];

// ─── sample markets for demo ──────────────────────────────────────────────────
// These are pre-created markets on devnet that exist for the demo.
// In production these would be fetched by scanning program accounts.
// We hard-code two sample markets here so judges can see the full UI
// without needing to set up accounts from scratch.

const SAMPLE_MARKETS = [
  {
    address: "Boc3xuvzNCP8XuwAL3nrLU1YbfkP54zQWQVfSPBoLwbv",
    fixtureId: "18257739",
    matchName: "World Cup Final - Spain vs Argentina",
    statKeyA: 1,
    statKeyB: 2,
    op: 0,
    comparison: 0,
    threshold: 2,
    closeUnixTime: 1753052400 + 60 * 60 * 48,
    status: 0,
    yesPool: 0,
    noPool: 0,
    settledResult: 0,
    isDemo: false,
    marketIndex: 6,
  },
  {
    address: "GEANj5otGxg3mohx8ketfrnHvZ6rVDcXAAfnwpSsEbbq",
    fixtureId: "18257739",
    matchName: "World Cup Final - Spain vs Argentina",
    statKeyA: 3,
    statKeyB: 4,
    op: 0,
    comparison: 0,
    threshold: 9,
    closeUnixTime: 1753052400 + 60 * 60 * 48,
    status: 0,
    yesPool: 0,
    noPool: 0,
    settledResult: 0,
    isDemo: false,
    marketIndex: 7,
  },
  {
    address: "6s1ufwxVcQ1dA3hP25uBZVbwHYbAnKMekgGR6vXFCUy5",
    fixtureId: "18237038",
    matchName: "France vs Spain",
    statKeyA: 5,
    statKeyB: 6,
    op: 0,
    comparison: 0,
    threshold: 4,
    closeUnixTime: 1784055600 + 60 * 60 * 120,
    status: 0,
    yesPool: 0,
    noPool: 0,
    settledResult: 0,
    isDemo: false,
    marketIndex: 4,
  },
  {
    address: "GjyVpoBamxXsimAo6v5dJg7QdBc5HxQaD6gu2JVKnLyL",
    fixtureId: "18241006",
    matchName: "England vs Argentina",
    statKeyA: 1,
    statKeyB: 2,
    op: 0,
    comparison: 0,
    threshold: 2,
    closeUnixTime: 1784142000 + 60 * 60 * 144,
    status: 0,
    yesPool: 0,
    noPool: 0,
    settledResult: 0,
    isDemo: false,
    marketIndex: 5,
  },
];

// ─── wallet ───────────────────────────────────────────────────────────────────

async function connectWallet() {
  const provider = getProvider();
  if (!provider) {
    toast("No Solana wallet found. Install Phantom or Solflare.", "err");
    window.open("https://phantom.app", "_blank");
    return;
  }
  try {
    const resp = await provider.connect();
    wallet = (resp.publicKey || provider.publicKey).toString();
    const btn = document.getElementById("walletBtn");
    btn.textContent = wallet.slice(0, 4) + "..." + wallet.slice(-4);
    btn.classList.add("connected");
    btn.onclick = disconnectWallet;
    toast("Wallet connected", "ok");
  } catch (e) {
    toast("Could not connect wallet", "err");
  }
}

function getProvider() {
  if ('phantom' in window) {
    const provider = window.phantom?.solana;
    if (provider?.isPhantom) return provider;
  }
  if ('solflare' in window && window.solflare.isSolflare) return window.solflare;
  if (window.solana) return window.solana;
  return null;
}

function disconnectWallet() {
  const provider = getProvider();
  if (provider?.disconnect) provider.disconnect();
  wallet = null;
  const btn = document.getElementById("walletBtn");
  btn.textContent = "Connect wallet";
  btn.classList.remove("connected");
  btn.onclick = connectWallet;
  toast("Wallet disconnected", "");
}

// ─── helpers ──────────────────────────────────────────────────────────────────

function conditionText(m) {
  const a = STAT_LABELS[m.statKeyA] || `Stat ${m.statKeyA}`;
  const comp = COMPARISON_LABELS[m.comparison] || "vs";
  if (m.statKeyB) {
    const b = STAT_LABELS[m.statKeyB] || `Stat ${m.statKeyB}`;
    const op = OP_LABELS[m.op] || "+";
    return `${a} ${op} ${b} ${comp} ${m.threshold}`;
  }
  return `${a} ${comp} ${m.threshold}`;
}

function formatUsdc(micro) {
  return (micro / 1_000_000).toFixed(2) + " USDC";
}

function timeLeft(unixTime) {
  const diff = unixTime - Math.floor(Date.now() / 1000);
  if (diff <= 0) return "Closed - Pending Settlement";
  const h = Math.floor(diff / 3600);
  const m = Math.floor((diff % 3600) / 60);
  if (h > 0) return `${h}h ${m}m remaining`;
  return `${m}m remaining`;
}

function explorerLink(address) {
  return `${EXPLORER}/address/${address}?cluster=devnet`;
}

function toast(msg, type = "") {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.className = "toast show " + type;
  clearTimeout(el._t);
  el._t = setTimeout(() => el.classList.remove("show"), 3500);
}

// ─── place bet ───────────────────────────────────────────────────────────────

async function placeBet(marketAddress, sideIsYes) {
  if (!wallet) { toast("Connect your wallet first", "err"); return; }

  const provider = getProvider();
  if (!provider) { toast("No wallet found", "err"); return; }

  const input = document.getElementById("amount_" + marketAddress);
  const amount = parseFloat(input?.value);
  if (!amount || amount <= 0) { toast("Enter an amount", "err"); return; }

  const amountLamports = Math.round(amount * 1_000_000);

  try {
    toast("Building transaction...", "");

    const conn = new solanaWeb3.Connection(RPC, "confirmed");
    const walletPubkey = new solanaWeb3.PublicKey(wallet);
    console.log('Wallet address in browser:', wallet);
    const marketPubkey = new solanaWeb3.PublicKey(marketAddress);
    const mintPubkey = new solanaWeb3.PublicKey(MINT);
    console.log('Mint:', mintPubkey.toBase58());
    const tokenProgram = new solanaWeb3.PublicKey(TOKEN_PROGRAM);
    const systemProgram = solanaWeb3.SystemProgram.programId;

    // derive market id from address - find which market this is
    const market = SAMPLE_MARKETS.find(m => m.address === marketAddress);
    const marketIndex = market.marketIndex || (SAMPLE_MARKETS.indexOf(market) + 1);
    const marketIdBuf = Buffer.alloc(8);
    marketIdBuf.writeBigUInt64LE(BigInt(marketIndex));

    const [marketPda] = solanaWeb3.PublicKey.findProgramAddressSync(
      [Buffer.from("market"), marketIdBuf],
      new solanaWeb3.PublicKey(PROGRAM_ID)
    );
    const [vaultPda] = solanaWeb3.PublicKey.findProgramAddressSync(
      [Buffer.from("vault"), marketIdBuf],
      new solanaWeb3.PublicKey(PROGRAM_ID)
    );
    const [positionPda] = solanaWeb3.PublicKey.findProgramAddressSync(
      [Buffer.from("position"), marketPda.toBuffer(), walletPubkey.toBuffer()],
      new solanaWeb3.PublicKey(PROGRAM_ID)
    );

    // use the fixed ATA address for testing
    const userAta = new solanaWeb3.PublicKey('2BHKfHC7FfyMehNStLnTL9WgxTggwprUXF5YKTcB8GA2');

    // encode place_position instruction

    // discriminator for place_position
    const disc = new Uint8Array([218, 31, 90, 75, 101, 209, 5, 253]);
    const data = new Uint8Array(8 + 8 + 1);
    data.set(disc, 0);
    const amountView = new DataView(data.buffer);
    amountView.setBigUint64(8, BigInt(amountLamports), true);
    data[16] = sideIsYes ? 1 : 0;

    const ix = {
      programId: new solanaWeb3.PublicKey(PROGRAM_ID),
      keys: [
        { pubkey: walletPubkey,  isSigner: true,  isWritable: true },
        { pubkey: marketPda,     isSigner: false, isWritable: true },
        { pubkey: vaultPda,      isSigner: false, isWritable: true },
        { pubkey: userAta,       isSigner: false, isWritable: true },
        { pubkey: positionPda,   isSigner: false, isWritable: true },
        { pubkey: tokenProgram,  isSigner: false, isWritable: false },
        { pubkey: systemProgram, isSigner: false, isWritable: false },
      ],
      data,
    };

    const { blockhash } = await conn.getLatestBlockhash();
    const tx = new solanaWeb3.Transaction({ recentBlockhash: blockhash, feePayer: walletPubkey });
    tx.add(ix);

    const signed = await provider.signTransaction(tx);
    const sig = await conn.sendRawTransaction(signed.serialize());
    await conn.confirmTransaction(sig);

    toast(`Bet placed! ${amount} USDC on ${sideIsYes ? "YES" : "NO"}`, "ok");
    setTimeout(() => loadMarkets(), 2000);
  } catch (e) {
    console.error(e);
    toast("Transaction failed: " + (e.message || "unknown error"), "err");
  }
}

// ─── render ───────────────────────────────────────────────────────────────────

function renderCard(m) {
  const condition = conditionText(m);
  const isOpen    = m.status === 0;
  const isYes     = m.settledResult === 1;
  const isPendingSettlement = m.status === 0 && Math.floor(Date.now() / 1000) > m.closeUnixTime;
  const badgeText = isPendingSettlement ? "PENDING" : isOpen ? "OPEN" : (isYes ? "YES" : "NO");
  const badgeClass = isPendingSettlement ? "open" : isOpen ? "open" : (isYes ? "yes" : "no");

  const totalPool = m.yesPool + m.noPool;
  const yesOdds = totalPool > 0 ? (totalPool / m.yesPool).toFixed(2) : "—";
  const noOdds  = totalPool > 0 ? (totalPool / m.noPool).toFixed(2)  : "—";

  const verifyCmd = `cd verify && npm run verify -- ${m.address}`;

  return `
    <div class="card">
      <div class="card-top">
        <div>
          <div class="match-name">${m.matchName} · fixture ${m.fixtureId}</div>
          <div class="condition">${condition}</div>
        </div>
        <div class="verdict-badge ${badgeClass}">${badgeText}</div>
      </div>

      <div class="pool-row">
        <div class="pool-side yes-side">
          <div class="pool-side-label">Yes pool</div>
          <div class="pool-amount">${formatUsdc(m.yesPool)}</div>
          <div class="pool-side-sub">${yesOdds}x payout</div>
        </div>
        <div class="pool-side no-side">
          <div class="pool-side-label">No pool</div>
          <div class="pool-amount">${formatUsdc(m.noPool)}</div>
          <div class="pool-side-sub">${noOdds}x payout</div>
        </div>
      </div>

      ${isOpen ? `
        <div class="bet-row">
          <input
            class="amount-input"
            id="amount_${m.address}"
            type="number"
            min="0.01"
            step="0.01"
            placeholder="USDC amount"
          />
          <button class="bet-btn yes-btn" onclick="placeBet('${m.address}', true)">
            Bet YES
          </button>
          <button class="bet-btn no-btn" onclick="placeBet('${m.address}', false)">
            Bet NO
          </button>
        </div>
        <div class="close-time">Closes in ${timeLeft(m.closeUnixTime)}</div>
      ` : `
        <div class="settled-result">
          <div>
            <div class="result-label">Result</div>
            <div class="result-value ${isYes ? 'yes' : 'no'}">${isYes ? "YES" : "NO"}</div>
          </div>
          <div style="margin-left:auto;text-align:right">
            <div class="result-label" style="margin-bottom:6px">Verify this result yourself</div>
            <a
              class="verify-link"
              href="${explorerLink(m.address)}"
              target="_blank"
              title="${verifyCmd}"
            >
              view on explorer ↗
            </a>
            <div style="margin-top:6px;font-family:var(--mono);font-size:11px;color:var(--muted)">
              or run: npm run verify -- ${m.address.slice(0, 8)}...
            </div>
          </div>
        </div>
      `}

      <div style="margin-top:12px">
        <a class="verify-link" href="${explorerLink(m.address)}" target="_blank">
          ${m.address.slice(0, 8)}...${m.address.slice(-6)} ↗
        </a>
        ${m.isDemo ? '<span style="font-family:var(--mono);font-size:11px;color:var(--muted);margin-left:12px">[demo market]</span>' : ''}
      </div>
    </div>
  `;
}

function render() {
  const app = document.getElementById("app");
  const open = SAMPLE_MARKETS.filter(m => m.status === 0);
  const settled = SAMPLE_MARKETS.filter(m => m.status === 1);

  let html = "";

  if (open.length > 0) {
    html += `<div class="section-label">Open markets</div>`;
    html += open.map(renderCard).join("");
  }

  if (settled.length > 0) {
    if (open.length > 0) html += `<hr class="divider" />`;
    html += `<div class="section-label">Settled — results verified on chain</div>`;
    html += settled.map(renderCard).join("");
  }

  if (open.length === 0 && settled.length === 0) {
    html = `
      <div class="empty">
        <div class="empty-icon">⬜</div>
        <div>No markets yet</div>
      </div>
    `;
  }

  app.innerHTML = html;
}

// ─── init ─────────────────────────────────────────────────────────────────────

async function loadMarkets() {
  try {
    const conn = new solanaWeb3.Connection(RPC, "confirmed");
    for (let i = 0; i < SAMPLE_MARKETS.length; i++) {
      const info = await conn.getAccountInfo(new solanaWeb3.PublicKey(SAMPLE_MARKETS[i].address));
      if (info) {
        const d = info.data;
        // skip 8 byte discriminator, 32 creator, 8 market_id, 8 fixture_id, 4+4 stat keys, 1+1 op+comparison, 4 threshold, 8 close_time
        let offset = 8 + 32 + 8 + 8 + 4 + 4 + 1 + 1 + 4;
        const closeTime = Number(d.readBigInt64LE(offset)); offset += 8;
        SAMPLE_MARKETS[i].closeUnixTime = closeTime;
        SAMPLE_MARKETS[i].status = d[offset]; offset += 1;
        const yesPool = d.readBigUInt64LE(offset); offset += 8;
        const noPool = d.readBigUInt64LE(offset); offset += 8;
        SAMPLE_MARKETS[i].yesPool = Number(yesPool);
        SAMPLE_MARKETS[i].noPool = Number(noPool);
        SAMPLE_MARKETS[i].settledResult = d[offset];
      }
    }
  } catch(e) {
    console.error("Failed to load markets:", e);
  }
  markets = SAMPLE_MARKETS;
  render();
}

window.addEventListener("DOMContentLoaded", () => {
  loadMarkets();
  const provider = window.solana || window.phantom?.solana;
  if (provider?.isConnected) connectWallet();
});

</script>
